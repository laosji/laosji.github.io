{{ define "main" }}
    <div class="not-found-card">
        <h1 class="article-title">404</h1>
        <h2 class="article-subtitle">页面未找到</h2>
        <p class="not-found-description">你访问的页面不存在或已被移除。</p>
        <div class="not-found-actions">
            <a href="{{ .Site.BaseURL }}" class="not-found-btn">返回首页</a>
            <a href="{{ "page/search/" | relURL }}" class="not-found-btn not-found-btn--outline">搜索文章</a>
        </div>
    </div>
    {{ partialCached "footer/footer" . }}
{{ end }}
