<!-- 打赏（微信/支付宝收款码）+ 微信公众号阅读 -->
{{- $wechatLink := or .Params.wechatLink .Params.wechatlink -}}
<div class="article-donation">
  <div class="donation-head">
    <h4>打赏作者</h4>
    <p class="donation-tip">觉得有帮助，扫码随意打赏，谢谢支持 🙏</p>
  </div>

  <div class="donation-qrs">
    <figure class="donation-qr">
      <img src="{{ "img/reward-wechat.png" | relURL }}" alt="微信收款码" loading="lazy" width="180" height="179" />
      <figcaption><span class="dot dot-wechat"></span>微信</figcaption>
    </figure>
    <figure class="donation-qr">
      <img src="{{ "img/reward-alipay.png" | relURL }}" alt="支付宝收款码" loading="lazy" width="180" height="196" />
      <figcaption><span class="dot dot-alipay"></span>支付宝</figcaption>
    </figure>
  </div>

  {{ if $wechatLink }}
  <div class="wechat-cta">
    <button type="button" id="wechat-button" class="wechat-button" data-wechat-link="{{ $wechatLink }}">
      <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.5 3 3 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path>
      </svg>
      在微信公众号阅读本文
    </button>
  </div>
  {{ end }}
</div>
<style>
.article-donation {
  margin: 2.5rem auto;
  padding: 2rem 1.5rem;
  max-width: 480px;
  border-radius: 14px;
  background: var(--card-background);
  box-shadow: var(--shadow-l1);
  text-align: center;
}
.donation-head h4 {
  margin: 0;
  font-size: 1.05rem;
  letter-spacing: 0.02em;
  color: var(--card-text-color-main);
}
.donation-tip {
  font-size: 0.85rem;
  color: var(--card-text-color-secondary);
  margin: 0.4rem 0 1.5rem;
}
.donation-qrs {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.donation-qr {
  margin: 0;
  flex: 0 1 180px;
}
.donation-qr img {
  width: 100%;
  max-width: 180px;
  height: auto;
  border-radius: 10px;
  display: block;
  background: #fff;
}
.donation-qr figcaption {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 0.6rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--card-text-color-main);
}
.donation-qr .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot-wechat { background: #07C160; }
.dot-alipay { background: #1677FF; }
.wechat-cta {
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--card-separator-color);
}
.wechat-button {
  padding: 10px 22px;
  min-height: 42px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  transition: opacity 0.25s, transform 0.2s, box-shadow 0.2s;
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background-color: #07C160; /* WeChat green */
  color: #fff;
  box-shadow: 0 2px 8px rgba(7, 193, 96, 0.3);
}
.wechat-button:hover {
  opacity: 0.95;
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(7, 193, 96, 0.4);
}
.wechat-button:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(7, 193, 96, 0.3);
}
.button-icon {
  margin-right: 8px;
}
@media (max-width: 420px) {
  .donation-qrs { gap: 0.75rem; }
  .donation-qr { flex-basis: 140px; }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const wechatButton = document.getElementById('wechat-button');
  if (wechatButton) {
    wechatButton.addEventListener('click', function() {
      const wechatLink = this.getAttribute('data-wechat-link');
      if (wechatLink) {
        window.open(wechatLink, '_blank');
      }
    });
  }
});
</script>
