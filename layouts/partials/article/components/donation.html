<!-- 打赏（微信/支付宝收款码）+ 微信公众号阅读 -->
<div class="article-donation">
  <!-- 打赏：微信 + 支付宝收款码 -->
  <div class="donation-section">
    <h4>打赏作者</h4>
    <p class="donation-tip">觉得有帮助，扫码随意打赏，谢谢支持</p>
    <div class="donation-qrs">
      <figure class="donation-qr">
        <img src="{{ "img/reward-wechat.png" | relURL }}" alt="微信收款码" loading="lazy" width="180" height="240" />
        <figcaption>微信</figcaption>
      </figure>
      <figure class="donation-qr">
        <img src="{{ "img/reward-alipay.png" | relURL }}" alt="支付宝收款码" loading="lazy" width="180" height="240" />
        <figcaption>支付宝</figcaption>
      </figure>
    </div>
  </div>

  <!-- 微信公众号阅读 -->
  <div class="wechat-section">
    <h4>在微信中阅读</h4>
    {{- $wechatLink := or .Params.wechatLink .Params.wechatlink -}}
    {{ if $wechatLink }}
    <button type="button" id="wechat-button" class="wechat-button" data-wechat-link="{{ $wechatLink }}">
      <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.5 3 3 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path>
      </svg>
      打开公众号阅读
    </button>
    <p class="wechat-tip">去微信公众号阅读</p>
    {{ else }}
    <p class="wechat-notice">暂无微信公众号链接</p>
    {{ end }}
  </div>
</div>
<style>
.article-donation {
  margin-top: 2rem;
  margin-bottom: 2rem;
  padding: 1.5rem;
  border-top: 1px solid var(--card-separator-color);
  border-bottom: 1px solid var(--card-separator-color);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  max-width: var(--article-width);
  margin-left: auto;
  margin-right: auto;
}
.donation-section, .wechat-section {
  padding: 1.5rem;
  margin: 0.5rem;
  border-radius: 8px;
  background: var(--card-background);
  box-shadow: var(--shadow-l1);
  flex: 1;
  min-width: 250px;
  text-align: center;
}
.donation-tip {
  font-size: 0.9rem;
  color: var(--card-text-color-secondary);
  margin: 0.25rem 0 1rem;
}
.donation-qrs {
  display: flex;
  justify-content: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}
.donation-qr {
  margin: 0;
}
.donation-qr img {
  width: 180px;
  height: auto;
  border-radius: 8px;
  display: block;
}
.donation-qr figcaption {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--card-text-color-main);
}
.wechat-button {
  padding: 12px 20px;
  min-height: 44px;
  border-radius: var(--radius-md, 8px);
  cursor: pointer;
  font-weight: bold;
  transition: opacity 0.3s, transform 0.2s;
  border: none;
  margin-top: 1rem;
  margin-bottom: 1rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background-color: #07C160; /* WeChat green */
  color: white;
}
.wechat-button:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}
.wechat-button:active {
  transform: translateY(0);
}
.wechat-tip, .wechat-notice {
  font-size: 0.9rem;
  color: var(--card-text-color-secondary);
  margin-top: 0.5rem;
}
.wechat-notice {
  font-style: italic;
}
.button-icon {
  margin-right: 8px;
}
@media (max-width: 650px) {
  .article-donation {
    flex-direction: column;
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // 微信公众号文章链接
  const wechatButton = document.getElementById('wechat-button');
  if (wechatButton) {
    wechatButton.addEventListener('click', function() {
      const wechatLink = this.getAttribute('data-wechat-link');
      if (wechatLink) {
        window.open(wechatLink, '_blank');
      }
    });
  }
});
</script>
